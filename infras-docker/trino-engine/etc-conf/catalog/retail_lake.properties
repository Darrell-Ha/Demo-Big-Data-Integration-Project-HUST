connector.name=iceberg
iceberg.catalog.type=hive_metastore
hive.metastore.uri=thrift://metastore-svc.retail-lake.domain:9083

hive.config.resources=/etc/trino/metastore/hive-site.xml
# hive.insert-existing-partitions-behavior=OVERWRITE

fs.native-s3.enabled=true

s3.endpoint=http://minio.retail-lake.domain:9000
s3.region=us-east-1
s3.aws-access-key=${ENV:S3_ACCESS_KEY}
s3.aws-secret-key=${ENV:S3_SECRET_KEY}
s3.path-style-access=true