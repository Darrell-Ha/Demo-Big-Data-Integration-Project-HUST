  hive-metastore-data:
    name: olist-hive-metastore-data
  minio-data:
    name: olist-minio-data

networks:
  retail-lake-network:
    name: retail-lake.domain
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.19.0.0/16
