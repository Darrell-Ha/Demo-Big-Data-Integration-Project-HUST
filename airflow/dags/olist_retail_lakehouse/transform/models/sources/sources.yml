# models/sources/sources.yml
# Khai báo Bronze Iceberg tables làm source cho Silver models.
# Các bảng này do PySpark/Airflow tạo và quản lý — dbt chỉ SELECT từ đây.

version: 2

sources:
  - name: olist_bronze
    description: "Bronze Iceberg tables"
    database: retail_lake      # Trino catalog
    schema:   olist_bronze       # Iceberg namespace / schema
    tags: ["olist_bronze", "raw", "iceberg"]
    # Freshness check: cảnh báo nếu Bronze chưa được load trong 24h
    loaded_at_field: _ingested_at
    freshness:
      warn_after:  {count: 24, period: hour}
      error_after: {count: 48, period: hour}

    tables:
      - name: orders
        description: "Raw orders"
        columns:
          - name: order_id
            tests:
              - not_null
              - unique
          - name: customer_id
            tests:
              - not_null
          - name: order_status
            tests:
              - not_null
              - accepted_values:
                  values: ['created','approved','invoiced','processing',
                           'shipped','delivered','unavailable','canceled']
          - name: order_purchase_timestamp
            tests:
              - not_null

      - name: order_items
        description: "Raw order items"
        columns:
          - name: order_id
            tests: [not_null]
          - name: order_item_id
            tests: [not_null]
          - name: price
            tests:
              - not_null
              - dbt_utils.accepted_range: {min_value: 0}
          - name: freight_value
            tests:
              - not_null
              - dbt_utils.accepted_range: {min_value: 0}

      - name: customers
        description: "Raw customers"
        columns:
          - name: customer_id
            tests: [not_null, unique]
          - name: customer_state
            tests:
              - not_null
              - accepted_values:
                  values: ['AC','AL','AP','AM','BA','CE','DF','ES','GO',
                           'MA','MT','MS','MG','PA','PB','PR','PE','PI',
                           'RJ','RN','RS','RO','RR','SC','SP','SE','TO']
                  config: {severity: warn}

      - name: products
        description: "Raw products"
        columns:
          - name: product_id
            tests: [not_null, unique]

      - name: sellers
        description: "Raw sellers"
        columns:
          - name: seller_id
            tests: [not_null, unique]

      - name: order_payments
        description: "Raw order payments"
        columns:
          - name: order_id
            tests: [not_null]
          - name: payment_sequential
            tests: [not_null]
          - name: payment_value
            tests:
              - not_null
              - dbt_utils.accepted_range: {min_value: 0}

      - name: order_reviews
        description: "Raw order reviews"
        columns:
          - name: review_id
            tests: [not_null]
          - name: order_id
            tests: [not_null]
          - name: review_score
            tests:
              - dbt_utils.accepted_range:
                  min_value: 1
                  max_value: 5
                  config: {severity: warn}

      - name: geolocation
        description: "Raw geolocation"

      - name: product_category_name_translation
        description: "Category name translation PT → EN"
