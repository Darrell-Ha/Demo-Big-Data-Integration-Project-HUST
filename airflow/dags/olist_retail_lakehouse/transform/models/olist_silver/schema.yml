# models/silver/schema.yml

version: 2

models:
  - name: slv_orders
    description: "Cleaned, deduplicated orders với DQ flags"
    columns:
      - name: order_id
        tests: [not_null, unique]
      - name: customer_id
        tests:
          - not_null
          - relationships:
              to: ref('slv_customers')
              field: customer_id
      - name: order_status
        tests:
          - not_null
          - accepted_values:
              values: ['created','approved','invoiced','processing',
                       'shipped','delivered','unavailable','canceled']
      - name: order_purchase_timestamp
        tests: [not_null]
      - name: is_delivery_before_purchase
        tests:
          - accepted_values:
              values: [false]
              quote: false
              config: {severity: warn}

  - name: slv_order_items
    description: "Cleaned order items với referential integrity"
    columns:
      - name: order_id
        tests:
          - not_null
          - relationships:
              to: ref('slv_orders')
              field: order_id
      - name: order_item_id
        tests: [not_null]
      - name: price
        tests:
          - not_null
          - dbt_utils.accepted_range: {min_value: 0}
      - name: freight_value
        tests:
          - not_null
          - dbt_utils.accepted_range: {min_value: 0}

  - name: slv_customers
    description: "Cleaned customers"
    columns:
      - name: customer_id
        tests: [not_null, unique]
      - name: customer_state
        tests:
          - not_null
          - accepted_values:
              values: ['AC','AL','AP','AM','BA','CE','DF','ES','GO',
                       'MA','MT','MS','MG','PA','PB','PR','PE','PI',
                       'RJ','RN','RS','RO','RR','SC','SP','SE','TO']
              config: {severity: warn}

  - name: slv_products
    description: "Cleaned products với category translation"
    columns:
      - name: product_id
        tests: [not_null, unique]

  - name: slv_sellers
    description: "Cleaned sellers"
    columns:
      - name: seller_id
        tests: [not_null, unique]

  - name: slv_order_payments
    description: "Cleaned payments với referential integrity"
    columns:
      - name: order_id
        tests:
          - not_null
          - relationships:
              to: ref('slv_orders')
              field: order_id
      - name: payment_value
        tests:
          - dbt_utils.accepted_range: {min_value: 0}

  - name: slv_order_reviews
    description: "Cleaned reviews với validated score"
    columns:
      - name: review_id
        tests: [not_null]
      - name: order_id
        tests:
          - not_null
          - relationships:
              to: ref('slv_orders')
              field: order_id
      - name: review_score
        tests:
          - dbt_utils.accepted_range:
              min_value: 1
              max_value: 5
              config: {severity: warn}

  - name: slv_order_timeline
    description: "Flattened timestamps — 1 row per event per order"
    columns:
      - name: order_id
        tests: [not_null]
      - name: event_type
        tests:
          - not_null
          - accepted_values:
              values: ['purchase','approved','carrier_pickup',
                       'delivered','estimated_delivery']
